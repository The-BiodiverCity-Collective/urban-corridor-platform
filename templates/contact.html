{% extends "_base.html" %}

{% block head %}
  <style type="text/css">
  main p{margin-bottom:1em}
  </style>
{% endblock %}

{% block content %}

  {% if not info.meta_data.hide_title %}
    <h1>{{ info }}</h1>
  {% endif %}

            <p class="mt-1 text-gray-500">
              {{ _("Fill out the form below or send us an e-mail at ") }}
              {{ SITE.email }}.
            </p>

            <form class="space-y-6" method="POST">
              {% csrf_token %}
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <label class="block">
                  <span class="text-sm font-medium text-gray-700">{{ _("Name") }}</span>
                  <input
                    name="name"
                    type="text"
                    required
                    class="mt-1 block w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"
                  />
                </label>

                <label class="block">
                  <span class="text-sm font-medium text-gray-700">{{ _("Organisation (optional)") }}</span>
                  <input
                    name="organization"
                    type="text"
                    class="mt-1 block w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"
                  />
                </label>
              </div>

              <label class="block">
                <span class="text-sm font-medium text-gray-700">E‑mail</span>
                <input
                  name="email"
                  type="email"
                  required
                  class="mt-1 block w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"
                />
              </label>

              <label class="block">
                <span class="text-sm font-medium text-gray-700">{{ _("Message") }}</span>
                <textarea
                  name="message"
                  rows="6"
                  required
                  class="mt-1 block w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-gray-900 resize-y focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"
                ></textarea>
              </label>

              <div class="flex items-center justify-between gap-4">
                <button
                  type="submit"
                  class="btn-green"
                >
                  {{ _("Send") }}
                </button>

              </div>

            </form>

{% if request.user.is_staff %}
  <a class="btn-warning btn-edit" href="{% url "controlpanel_page" info.id %}?redirect={{ request.get_full_path }}">
    <i class="fa fa-pencil"></i>
  </a>
{% endif %}

{% endblock %}
